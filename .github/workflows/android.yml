name: Android Build - JDK 17 Fix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 - Correct Way
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        check-latest: false

    - name: Verify Java Installation
      run: |
        echo "🔍 Checking Java..."
        java -version
        javac -version
        echo "JAVA_HOME: $JAVA_HOME"
        which java
        which javac
        echo "✅ Java verified"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        ndk-version: r25c

    - name: Accept Licenses
      run: |
        echo "yes" | $ANDROID_HOME/tools/bin/sdkmanager --licenses
        echo "✅ Licenses accepted"

    - name: Download SDK Components
      run: |
        $ANDROID_HOME/tools/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0"
        echo "✅ SDK ready"

    - name: Clean Project
      run: |
        rm -rf app build build.gradle.kts settings.gradle.kts gradlew gradle .gradle gradle.properties 2>/dev/null || true
        rm -rf .idea *.iml 2>/dev/null || true

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/{values,layout,mipmap,drawable,xml}
        mkdir -p gradle/wrapper

        # Root build.gradle.kts
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.1.0" apply false
            id("org.jetbrains.kotlin.android") version "1.8.20" apply false
        }
        
        tasks.register("clean", Delete::class) {
            delete(rootProject.buildDir)
        }
        EOF

        # Settings
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "HackerRDX"
        include(":app")
        EOF

        # gradle.properties
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        org.gradle.caching=true
        android.useAndroidX=true
        android.enableJetifier=true
        android.suppressUnsupportedCompileSdk=34
        EOF

        # MainActivity
        cat > app/src/main/java/com/example/MainActivity.kt << 'EOF'
        package com.example
        
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.Box
        import androidx.compose.foundation.layout.fillMaxSize
        import androidx.compose.material3.Text
        import androidx.compose.runtime.Composable
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    Box(modifier = Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                        Text("HackerRDX - Build Success!")
                    }
                }
            }
        }
        EOF

        # Manifest
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools"
            package="com.example">
            
            <uses-permission android:name="android.permission.INTERNET" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:theme="@style/Theme.HackerRDX"
                tools:targetApi="34">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">HackerRDX</string>
        </resources>
        EOF

        # colors.xml
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="purple_500">#FF6200EE</color>
            <color name="purple_700">#FF3700B3</color>
            <color name="teal_200">#FF03DAC5</color>
            <color name="black">#FF000000</color>
            <color name="white">#FFFFFFFF</color>
        </resources>
        EOF

        # themes.xml
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.HackerRDX" parent="android:Theme.Material.Light">
                <item name="android:colorPrimary">@color/purple_500</item>
            </style>
        </resources>
        EOF

        # App build.gradle.kts
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.example"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.example"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            
            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            buildFeatures {
                compose = true
            }
            
            composeOptions {
                kotlinCompilerExtensionVersion = "1.4.8"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.activity:activity-compose:1.8.0")
            implementation("androidx.compose.ui:ui:1.5.4")
            implementation("androidx.compose.material3:material3:1.1.1")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
        }
        EOF

        # gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

        echo "✅ Project created"

    - name: Create Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew
        ls -la gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
