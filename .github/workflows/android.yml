name: Android Ultimate Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Pure Project Structure Generator
      run: |
        # Remove old build artifacts
        rm -rf app build.gradle.kts settings.gradle.kts gradlew gradle .gradle
        rm -f AndroidManifest.xml
        rm -f app/src/main/AndroidManifest.xml
        
        # Create directory structure
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p gradle/wrapper

        # Create MainActivity.kt
        cat > app/src/main/java/com/example/MainActivity.kt << 'EOF'
        package com.example
        
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    // Empty composable
                }
            }
        }
        EOF

        # Create correct AndroidManifest.xml with proper attributes
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example">
            
            <uses-permission android:name="android.permission.INTERNET" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # Create settings.gradle.kts
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "HackerRDX"
        include(":app")
        EOF

        # Create build.gradle.kts
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.example"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.example"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            
            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("androidx.activity:activity-compose:1.8.0")
            implementation("androidx.compose.ui:ui:1.5.4")
            implementation("com.google.android.material:material:1.10.0")
        }
        EOF

        # Create gradle.properties
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        
        EOF

        # Create strings.xml resource
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">HackerRDX</string>
        </resources>
        EOF

    - name: Use Official Stable Compiler
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    - name: Generate Final APK
      run: cd app && gradle assembleDebug --no-daemon

    - name: Upload APK Download Link
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: app/build/outputs/apk/debug/*.apk

